# Machine configuration for the Dogbone Darker product.
#
# This is a fictitious product, identical to the Dogbone Dark
# (Beaglebone Black) but configured to use out-of-source kernel and
# U-Boot defconfigs and device trees shipped from this layer.
#
# Inherit everything from dogbonedark and override only what differs,
# so the deltas introduced by this machine are easy to read.
require conf/machine/dogbonedark.conf

# Use the device tree shipped by meta-kiss (see linux-kiss.inc),
# copied into the kernel source tree at do_configure time.
KERNEL_DEVICETREE = "ti/omap/am335x-dogbonedarker.dtb"

# This board's hardware is a real BeagleBone Black, so U-Boot's board
# code reads the EEPROM and sets fdtfile=am335x-boneblack.dtb. That
# would make the default extlinux FDTDIR lookup pull the wrong dtb.
# Pin the FDT path explicitly to our shipped device tree instead.
UBOOT_EXTLINUX_FDT = "../am335x-dogbonedarker.dtb"

# Use the defconfig and device tree shipped by meta-kiss (see
# u-boot-kiss_git.bb), dropped into the U-Boot tree at do_configure
# time.
UBOOT_MACHINE = "dogbonedarker_defconfig"
UBOOT_MAKE_TARGET = " DEVICE_TREE=am335x-dogbonedarker"
