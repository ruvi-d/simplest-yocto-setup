name: lint

on:
  pull_request:
    branches: [main]

jobs:
  oelint:
    name: oelint-adv (changed recipes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List changed recipe files under meta-kiss/
        id: changed
        run: |
          base="origin/${{ github.base_ref }}"
          files=$(git diff --name-only --diff-filter=ACMR "$base"...HEAD -- \
            'meta-kiss/**/*.bb' 'meta-kiss/**/*.bbappend' 'meta-kiss/**/*.inc')
          if [ -z "$files" ]; then
            echo "No recipe files changed under meta-kiss/."
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            echo "Changed recipes:"
            printf '  %s\n' $files
            {
              echo 'files<<EOF'
              echo "$files"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Install oelint-adv
        if: steps.changed.outputs.files != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pipx
          pipx ensurepath
          pipx install oelint-adv
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run oelint-adv
        if: steps.changed.outputs.files != ''
        env:
          OELINT_CONFIG: ${{ github.workspace }}/.oelint.cfg
        run: |
          # `.oelint.cfg` already sets `hide = info` and `quiet = True`,
          # so any output is a warning or error. oelint-adv exits non-zero
          # on findings above the hidden level, which fails the job.
          xargs -r oelint-adv <<< "${{ steps.changed.outputs.files }}"
